name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter-quality:
    name: Flutter quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test script

      - name: Generate localization files
        run: ./script/gen_l10n.sh

      - name: Check generated files are committed
        run: git diff --exit-code

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test
